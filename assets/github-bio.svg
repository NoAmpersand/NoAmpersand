<svg width="800" height="340" viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Jad L. — IT Engineer GitHub bio card</title>
  <desc>GitHub profile bio card for Jad L., IT Engineer based in Paris, France.</desc>
  <defs>
    <clipPath id="cc"><rect width="800" height="340" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#cc)">
    <rect width="800" height="340" fill="#0b0b14"/>
    <rect width="800" height="3" fill="#6366f1"/>
    <rect x="510" y="0" width="1" height="340" fill="#181828"/>
    <rect x="0" y="298" width="800" height="1" fill="#181828"/>

    <!-- README label -->
    <text x="36" y="36" font-family="'Courier New', monospace" font-size="10" fill="#6366f1" letter-spacing="3" font-weight="700">README.MD</text>
    <rect x="122" y="29" width="28" height="1" fill="#6366f1" opacity="0.5"/>

    <!-- Name -->
    <text x="36" y="86" font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif" font-size="52" fill="#eeeeff" font-weight="900" letter-spacing="-2">Jad L<tspan fill="#6366f1">.</tspan></text>

    <!-- Subtitle -->
    <text x="36" y="110" font-family="'Courier New', monospace" font-size="11" fill="#3a3a5c" letter-spacing="1">// IT Engineer — Paris, France</text>

    <!-- accent line -->
    <rect x="36" y="124" width="28" height="2" fill="#6366f1" rx="1"/>

    <!-- Description -->
    <text x="36" y="150" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#7070a0">I build systems that <tspan fill="#d0d0ff" font-weight="700">scale, deploy, and don't break at 3am.</tspan></text>
    <text x="36" y="170" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#7070a0">Focused on DevOps, Azure, solution architecture</text>
    <text x="36" y="190" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#7070a0">and low-level engineering. Some repos are private.</text>

    <!-- Currently on -->
    <rect x="36" y="208" width="204" height="22" rx="4" fill="#0078d415" stroke="#0078d450" stroke-width="1"/>
    <circle cx="50" cy="219" r="3.5" fill="#0078d4"/>
    <text x="60" y="223" font-family="'Courier New', monospace" font-size="9.5" fill="#4da6ff" letter-spacing="0.5">currently working on · Azure</text>

    <!-- Tags -->
    <rect x="36" y="243" width="70" height="22" rx="3" fill="#0e0e20" stroke="#6366f1" stroke-width="1"/>
    <text x="71" y="258" font-family="'Courier New', monospace" font-size="8.5" fill="#a5b4fc" text-anchor="middle" letter-spacing="1">DEVOPS</text>

    <rect x="114" y="243" width="60" height="22" rx="3" fill="#0e0e20" stroke="#6366f1" stroke-width="1"/>
    <text x="144" y="258" font-family="'Courier New', monospace" font-size="8.5" fill="#a5b4fc" text-anchor="middle" letter-spacing="1">AZURE</text>

    <rect x="182" y="243" width="96" height="22" rx="3" fill="#0e0e20" stroke="#6366f1" stroke-width="1"/>
    <text x="230" y="258" font-family="'Courier New', monospace" font-size="8.5" fill="#a5b4fc" text-anchor="middle" letter-spacing="1">CLOUD INFRA</text>

    <rect x="286" y="243" width="100" height="22" rx="3" fill="#0e0e20" stroke="#282840" stroke-width="1"/>
    <text x="336" y="258" font-family="'Courier New', monospace" font-size="8.5" fill="#404060" text-anchor="middle" letter-spacing="1">DISTRIBUTED SYS</text>

    <!-- Footer left -->
    <circle cx="44" cy="319" r="4" fill="#6366f1"/>
    <text x="56" y="323" font-family="'Courier New', monospace" font-size="11" fill="#6366f1">lebchiri.j@gmail.com</text>
    <text x="474" y="323" font-family="'Courier New', monospace" font-size="10" fill="#252540" text-anchor="end">48.8566° N, 2.3522° E</text>

    <!-- ── RIGHT PANEL ── -->
    <text x="530" y="36" font-family="'Courier New', monospace" font-size="9" fill="#282840" letter-spacing="2">TECH STACK</text>

    <!-- Row 1: Java, TypeScript -->
    <rect x="530" y="46" width="58" height="20" rx="10" fill="#1a120a" stroke="#ED8B0055" stroke-width="1"/>
    <text x="559" y="60" font-family="'Courier New', monospace" font-size="9" fill="#ED8B00" text-anchor="middle">Java</text>

    <rect x="596" y="46" width="90" height="20" rx="10" fill="#0a0f1a" stroke="#3178C655" stroke-width="1"/>
    <text x="641" y="60" font-family="'Courier New', monospace" font-size="9" fill="#3178C6" text-anchor="middle">TypeScript</text>

    <!-- Row 2: Spring Boot, Azure -->
    <rect x="530" y="74" width="90" height="20" rx="10" fill="#0a150a" stroke="#6DB33F55" stroke-width="1"/>
    <text x="575" y="88" font-family="'Courier New', monospace" font-size="9" fill="#6DB33F" text-anchor="middle">Spring Boot</text>

    <rect x="628" y="74" width="58" height="20" rx="10" fill="#00070f" stroke="#0078D455" stroke-width="1"/>
    <text x="657" y="88" font-family="'Courier New', monospace" font-size="9" fill="#0078D4" text-anchor="middle">Azure</text>

    <!-- Row 3: Terraform, Docker -->
    <rect x="530" y="102" width="76" height="20" rx="10" fill="#120a1a" stroke="#7B42BC55" stroke-width="1"/>
    <text x="568" y="116" font-family="'Courier New', monospace" font-size="9" fill="#7B42BC" text-anchor="middle">Terraform</text>

    <rect x="614" y="102" width="62" height="20" rx="10" fill="#00080f" stroke="#2496ED55" stroke-width="1"/>
    <text x="645" y="116" font-family="'Courier New', monospace" font-size="9" fill="#2496ED" text-anchor="middle">Docker</text>

    <!-- Row 4: Ansible, Maven -->
    <rect x="530" y="130" width="66" height="20" rx="10" fill="#150000" stroke="#EE000055" stroke-width="1"/>
    <text x="563" y="144" font-family="'Courier New', monospace" font-size="9" fill="#EE0000" text-anchor="middle">Ansible</text>

    <rect x="604" y="130" width="58" height="20" rx="10" fill="#0f0a00" stroke="#C7153855" stroke-width="1"/>
    <text x="633" y="144" font-family="'Courier New', monospace" font-size="9" fill="#C71538" text-anchor="middle">Maven</text>

    <!-- Divider -->
    <rect x="530" y="162" width="240" height="1" fill="#181828"/>

    <!-- Stats -->
    <text x="530" y="196" font-family="'Arial Black', Arial, sans-serif" font-size="36" fill="#eeeeff" font-weight="900">23</text>
    <text x="530" y="214" font-family="'Courier New', monospace" font-size="8" fill="#282840" letter-spacing="2">YEARS OLD</text>

    <text x="640" y="196" font-family="'Arial Black', Arial, sans-serif" font-size="36" fill="#6366f1" font-weight="900">∞</text>
    <text x="640" y="214" font-family="'Courier New', monospace" font-size="8" fill="#282840" letter-spacing="2">COFFEES</text>

    <!-- Divider -->
    <rect x="530" y="226" width="240" height="1" fill="#181828"/>

    <!-- Interests -->
    <text x="530" y="246" font-family="'Courier New', monospace" font-size="8" fill="#282840" letter-spacing="2">INTERESTS</text>
    <text x="530" y="264" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#505080">Cloud · DevOps · Architecture</text>
    <text x="530" y="282" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#505080">Distributed systems · Blockchain</text>

  </g>
</svg>
